<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Rankings — Esports Hub</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body data-page="Rankings">
    <div id="navbar-mount"></div>

    <div class="page-banner">
      <div class="container">
        <div class="page-banner-inner">
          <div>
            <div class="page-title">Rankings</div>
            <div class="page-subtitle">
              Team and player standings by win rate
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="container layout-full">
      <!-- Top Switch -->
      <div
        style="
          display: flex;
          gap: 16px;
          align-items: center;
          flex-wrap: wrap;
          margin-bottom: 16px;
        "
      >
        <div class="filter-tabs" id="mode-tabs" style="margin: 0">
          <button class="filter-tab active" onclick="switchMode(this,'teams')">
            Teams
          </button>
          <button class="filter-tab" onclick="switchMode(this,'players')">
            Players
          </button>
        </div>
        <div class="filter-tabs" id="region-tabs" style="margin: 0">
          <button class="filter-tab active" onclick="filterRegion(this,'')">
            All
          </button>
          <button class="filter-tab" onclick="filterRegion(this,'Americas')">
            Americas
          </button>
          <button class="filter-tab" onclick="filterRegion(this,'Pacific')">
            Pacific
          </button>
          <button class="filter-tab" onclick="filterRegion(this,'China')">
            China
          </button>
          <button class="filter-tab" onclick="filterRegion(this,'APAC')">
            APAC
          </button>
          <button class="filter-tab" onclick="filterRegion(this,'EMEA')">
            EMEA
          </button>
          <button class="filter-tab" onclick="filterRegion(this,'South Asia')">
            South Asia
          </button>
          <button class="filter-tab" onclick="filterRegion(this,'Asia')">
            Asia
          </button>
        </div>
      </div>

      <!-- Team rankings -->
      <div id="rankings-teams">
        <div class="card">
          <div class="rank-row header">
            <span style="text-align: center">Rank</span>
            <span>Team</span>
            <span>Region</span>
            <span style="text-align: center">Wins</span>
            <span style="text-align: center">Losses</span>
            <span style="text-align: center">W%</span>
            <span style="text-align: center">Matches</span>
          </div>
          <div id="teams-rank-list">
            <div class="loading">
              <div class="spinner"></div>
              <span>Loading...</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Player rankings -->
      <div id="rankings-players" style="display: none">
        <div class="card">
          <div
            style="
              display: grid;
              grid-template-columns: 110px 2.5fr 1fr 90px 80px 80px 80px; /* Increased from 50px */
              align-items: center;
              gap: 8px;
              padding: 10px 16px;
              background: var(--bg-3);
              font-family: var(--font-cond);
              font-size: 11px;
              text-transform: uppercase;
              letter-spacing: 0.8px;
              color: var(--text-3);
            "
          >
            <span style="text-align: center">Rank</span>
            <span>Player</span>
            <span>Team</span>
            <span style="text-align: center">Rating</span>
            <span style="text-align: center">ACS</span>
            <span style="text-align: center">K/D</span>
            <span style="text-align: center">Region</span>
          </div>
          <div id="players-rank-list">
            <div class="loading">
              <div class="spinner"></div>
              <span>Loading...</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="footer-mount"></div>
    <script src="/js/api.js"></script>
    <script>
      let mode = "teams";
      let region = "";

      async function loadTeamRankings(r = "") {
        const list = document.getElementById("teams-rank-list");
        list.innerHTML = Components.loading();
        try {
          const url = r ? `/rankings/teams?region=${r}` : "/rankings/teams";
          const teams = await API.get(url);
          if (!teams.length) {
            list.innerHTML = Components.empty("No teams found");
            return;
          }

          list.innerHTML = teams
            .map((t) => {
              const rankClass =
                t.rank === 1
                  ? "top1"
                  : t.rank === 2
                  ? "top2"
                  : t.rank === 3
                  ? "top3"
                  : "";
              return `
      <div class="rank-row" onclick="location.href='/team-detail.html?id=${
        t.team_id
      }'">
        <div class="rank-num ${rankClass}">${t.rank}</div>
        <div class="rank-team">
          ${
            t.logo
              ? `<img class="rank-team-logo" src="${t.logo}" alt="${t.name}" onerror="this.style.display='none'">`
              : `<div style="width:28px;height:28px;background:var(--bg-4);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:12px;font-weight:700;color:var(--text-3)">${t.name[0]}</div>`
          }
          <span class="rank-team-name">${t.name}</span>
        </div>
        <div>${Components.regionBadge(t.region)}</div>
        <div class="rank-stat text-green">${t.wins || 0}</div>
        <div class="rank-stat text-red">${t.losses || 0}</div>
        <div class="rank-stat rank-wr">${t.win_rate || 0}%</div>
        <div class="rank-stat text-muted">${t.total || 0}</div>
      </div>`;
            })
            .join("");
        } catch (e) {
          list.innerHTML = Components.empty("Failed to load rankings");
        }
      }

      async function loadPlayerRankings(r = "") {
        const list = document.getElementById("players-rank-list");
        list.innerHTML = Components.loading();
        try {
          const url = r ? `/rankings/players?region=${r}` : "/rankings/players";
          const players = await API.get(url);
          if (!players.length) {
            list.innerHTML = Components.empty("No players found");
            return;
          }

          list.innerHTML = players
            .map((p) => {
              const rankClass =
                p.rank === 1
                  ? "top1"
                  : p.rank === 2
                  ? "top2"
                  : p.rank === 3
                  ? "top3"
                  : "";
              return `
      <div style="display:grid;grid-template-columns:110px 2.5fr 1fr 90px 80px 80px 80px;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid var(--border);transition:background var(--trans);cursor:pointer"
           onmouseover="this.style.background='var(--bg-3)'" onmouseout="this.style.background=''"
           onclick="location.href='/player-detail.html?id=${p.player_id}'">
        <div class="rank-num ${rankClass}">${p.rank}</div>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="nav-avatar" style="width:32px;height:32px;font-size:12px;flex-shrink:0">${
            p.username ? p.username[0].toUpperCase() : "?"
          }</div>
          <div>
            <div style="font-family:var(--font-head);font-size:14px;font-weight:700">${
              p.username
            }</div>
            <div style="font-size:11px;color:var(--text-3)">${p.name}</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:5px">
          ${
            p.team_logo
              ? `<img style="width:18px;height:18px;object-fit:contain" src="${p.team_logo}" onerror="this.style.display='none'" alt="">`
              : ""
          }
          <span style="font-size:12px;color:var(--text-2)">${
            p.team_name || "—"
          }</span>
        </div>
        <div style="text-align:center;font-family:var(--font-cond);font-size:16px;font-weight:700;color:var(--accent)">${
          p.avg_rating ? p.avg_rating.toFixed(2) : "—"
        }</div>
        <div style="text-align:center;font-family:var(--font-cond);font-size:14px;font-weight:700">${
          p.avg_acs ? Math.round(p.avg_acs) : "—"
        }</div>
        <div style="text-align:center;font-family:var(--font-cond);font-size:14px;font-weight:700">${
          p.avg_kd ? p.avg_kd.toFixed(2) : "—"
        }</div>
        <div style="text-align:center">${Components.regionBadge(p.region)}</div>
      </div>`;
            })
            .join("");
        } catch (e) {
          list.innerHTML = Components.empty("Failed to load rankings");
        }
      }

      function switchMode(btn, m) {
        document
          .querySelectorAll("#mode-tabs .filter-tab")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        mode = m;
        document.getElementById("rankings-teams").style.display =
          m === "teams" ? "" : "none";
        document.getElementById("rankings-players").style.display =
          m === "players" ? "" : "none";
        if (m === "teams") loadTeamRankings(region);
        else loadPlayerRankings(region);
      }

      function filterRegion(btn, r) {
        document
          .querySelectorAll("#region-tabs .filter-tab")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        region = r;
        if (mode === "teams") loadTeamRankings(r);
        else loadPlayerRankings(r);
      }

      loadTeamRankings();
    </script>
  </body>
</html>
