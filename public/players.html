<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Players — Esports Hub</title>
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body data-page="Players">
    <div id="navbar-mount"></div>

    <div class="page-banner">
      <div class="container">
        <div class="page-banner-inner">
          <div>
            <div class="page-title">Players</div>
            <div class="page-subtitle">
              Professional Esports players worldwide
            </div>
          </div>
          <div class="region-filter" id="region-filter">
            <button class="filter-tab active" onclick="filterRegion(this,'')">
              All
            </button>
            <button class="filter-tab" onclick="filterRegion(this,'Americas')">
              Americas
            </button>
            <button class="filter-tab" onclick="filterRegion(this,'Pacific')">
              Pacific
            </button>
            <button class="filter-tab" onclick="filterRegion(this,'China')">
              China
            </button>
            <button class="filter-tab" onclick="filterRegion(this,'EMEA')">
              EMEA
            </button>
            <button
              class="filter-tab"
              onclick="filterRegion(this,'South Asia')"
            >
              South Asia
            </button>
            <button class="filter-tab" onclick="filterRegion(this,'Asia')">
              Asia
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="container layout-full">
      <!-- Search + filter bar -->
      <div
        style="
          display: flex;
          gap: 12px;
          align-items: center;
          flex-wrap: wrap;
          margin-bottom: 16px;
        "
      >
        <div class="nav-search" style="flex: 1; max-width: 320px">
          <svg
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          <input
            type="text"
            id="searchInput"
            placeholder="Search players..."
            oninput="filterPlayers()"
          />
        </div>
        <select
          id="teamFilter"
          class="form-select"
          style="width: 200px"
          onchange="filterPlayers()"
        >
          <option value="">All Teams</option>
        </select>
        <span
          id="player-count"
          style="font-size: 13px; color: var(--text-3)"
        ></span>
      </div>

      <!-- Table -->
      <div class="card">
        <div class="player-table-row" style="background: var(--bg-3)">
          <span
            style="
              font-family: var(--font-cond);
              font-size: 11px;
              text-transform: uppercase;
              letter-spacing: 0.8px;
              color: var(--text-3);
            "
            >#</span
          >
          <span
            style="
              font-family: var(--font-cond);
              font-size: 11px;
              text-transform: uppercase;
              letter-spacing: 0.8px;
              color: var(--text-3);
            "
            >Player</span
          >
          <span
            style="
              font-family: var(--font-cond);
              font-size: 11px;
              text-transform: uppercase;
              letter-spacing: 0.8px;
              color: var(--text-3);
            "
            >Team</span
          >
          <span
            style="
              font-family: var(--font-cond);
              font-size: 11px;
              text-transform: uppercase;
              letter-spacing: 0.8px;
              color: var(--text-3);
              text-align: center;
            "
            >Region</span
          >
          <span
            style="
              font-family: var(--font-cond);
              font-size: 11px;
              text-transform: uppercase;
              letter-spacing: 0.8px;
              color: var(--text-3);
              text-align: center;
            "
            >Country</span
          >
          <span
            style="
              font-family: var(--font-cond);
              font-size: 11px;
              text-transform: uppercase;
              letter-spacing: 0.8px;
              color: var(--text-3);
              text-align: center;
            "
            >Rank</span
          >
          <span
            style="
              font-family: var(--font-cond);
              font-size: 11px;
              text-transform: uppercase;
              letter-spacing: 0.8px;
              color: var(--text-3);
              text-align: center;
            "
            >Age</span
          >
          <span
            style="
              font-family: var(--font-cond);
              font-size: 11px;
              text-transform: uppercase;
              letter-spacing: 0.8px;
              color: var(--text-3);
              text-align: center;
            "
            >Status</span
          >
        </div>
        <div id="players-list">
          <div class="loading">
            <div class="spinner"></div>
            <span>Loading...</span>
          </div>
        </div>
      </div>
    </div>

    <div id="footer-mount"></div>
    <script src="/js/api.js"></script>
    <script>
      let allPlayers = [];

      async function loadPlayers(region = "") {
        const list = document.getElementById("players-list");
        list.innerHTML = Components.loading();
        try {
          const params = new URLSearchParams(location.search);
          const q = params.get("q") || "";
          if (q) document.getElementById("searchInput").value = q;

          let url = "/players?limit=200";
          if (region) url += `&region=${region}`;
          if (q) url += `&q=${encodeURIComponent(q)}`;

          allPlayers = await API.get(url);

          // Populate team filter
          const teamSel = document.getElementById("teamFilter");
          const teams = [
            ...new Set(
              allPlayers.filter((p) => p.team_name).map((p) => p.team_name)
            ),
          ].sort();
          teamSel.innerHTML =
            '<option value="">All Teams</option>' +
            teams.map((t) => `<option value="${t}">${t}</option>`).join("");

          renderPlayers(allPlayers);
        } catch (e) {
          list.innerHTML = Components.empty("Failed to load players");
        }
      }

      function renderPlayers(players) {
        const list = document.getElementById("players-list");
        document.getElementById(
          "player-count"
        ).textContent = `${players.length} players`;
        if (!players.length) {
          list.innerHTML = Components.empty("No players found");
          return;
        }

        list.innerHTML = players
          .map((p, i) => {
            const statusBadge =
              p.status === "Active"
                ? `<span class="badge badge-live">Active</span>`
                : p.status === "Banned"
                ? `<span class="badge" style="background:rgba(248,113,113,0.1);color:var(--red);border:1px solid rgba(248,113,113,0.3)">Banned</span>`
                : `<span class="badge badge-done">${
                    p.status || "Active"
                  }</span>`;

            return `
    <div class="player-table-row" onclick="location.href='/player-detail.html?id=${
      p.player_id
    }'">
      <span style="font-family:var(--font-cond);font-size:14px;font-weight:700;color:var(--text-3)">${
        i + 1
      }</span>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="nav-avatar" style="width:34px;height:34px;font-size:13px;flex-shrink:0">${
          p.username ? p.username[0].toUpperCase() : "?"
        }</div>
        <div>
          <div style="font-family:var(--font-head);font-size:14px;font-weight:700">${
            p.username || p.name
          }</div>
          <div style="font-size:11px;color:var(--text-3)">${p.name}</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;">
        ${
          p.team_logo
            ? `<img style="width:18px;height:18px;object-fit:contain" src="${p.team_logo}" onerror="this.style.display='none'" alt="">`
            : ""
        }
        <span style="font-size:13px;color:${
          p.team_name ? "var(--text-1)" : "var(--text-3)"
        }">${p.team_name || "Free Agent"}</span>
      </div>
      <div style="text-align:center">${Components.regionBadge(p.region)}</div>
      <span style="font-size:13px;color:var(--text-2);text-align:center">${
        p.country || "—"
      }</span>
      <span style="font-family:var(--font-cond);font-size:13px;font-weight:700;color:var(--accent);text-align:center">${
        p.rank || "—"
      }</span>
      <span style="font-size:13px;color:var(--text-2);text-align:center">${
        p.age || "—"
      }</span>
      <div style="text-align:center">${statusBadge}</div>
    </div>`;
          })
          .join("");
      }

      function filterRegion(btn, region) {
        document
          .querySelectorAll("#region-filter .filter-tab")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        loadPlayers(region);
      }

      function filterPlayers() {
        const q = document.getElementById("searchInput").value.toLowerCase();
        const team = document.getElementById("teamFilter").value;
        const filtered = allPlayers.filter((p) => {
          const matchQ =
            !q ||
            (p.username || "").toLowerCase().includes(q) ||
            p.name.toLowerCase().includes(q);
          const matchT = !team || p.team_name === team;
          return matchQ && matchT;
        });
        renderPlayers(filtered);
      }

      loadPlayers();
    </script>
  </body>
</html>
