<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Login — Esports Hub</title>
    <link rel="stylesheet" href="/css/style.css" />
    <style>
      .login-wrap {
        min-height: calc(100vh - var(--nav-h));
        display: grid;
        grid-template-columns: 1fr 1fr;
      }
      @media (max-width: 768px) {
        .login-wrap {
          grid-template-columns: 1fr;
        }
        .login-side {
          display: none;
        }
      }

      /* Left side — branding */
      .login-side {
        background: linear-gradient(160deg, #0a0310 0%, #0f1117 100%);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px;
        position: relative;
        overflow: hidden;
      }
      .login-side::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse at 50% 40%,
          rgba(167, 139, 250, 0.1) 0%,
          transparent 65%
        );
      }
      .side-logo {
        font-family: var(--font-head);
        font-size: 42px;
        font-weight: 700;
        letter-spacing: 3px;
        position: relative;
        z-index: 1;
      }
      .side-logo span {
        color: var(--accent);
      }
      .side-sub {
        font-size: 14px;
        color: var(--text-2);
        margin-top: 8px;
        position: relative;
        z-index: 1;
        text-align: center;
      }
      .side-games {
        display: flex;
        gap: 20px;
        margin-top: 36px;
        position: relative;
        z-index: 1;
      }
      .side-game-card {
        background: var(--bg-3);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 16px 20px;
        text-align: center;
        min-width: 90px;
      }
      .side-game-card .icon {
        font-size: 28px;
      }
      .side-game-card .name {
        font-family: var(--font-head);
        font-size: 12px;
        font-weight: 700;
        margin-top: 6px;
        color: var(--text-2);
      }
      .side-stats {
        margin-top: 32px;
        justify-content: center;
        position: relative;
        z-index: 1;
        display: flex;
        gap: 24px;
      }
      .side-stat {
        align-items: center;
        text-align: center;
      }
      .side-stat .sv {
        font-family: var(--font-head);
        font-size: 26px;
        font-weight: 700;
        color: var(--accent);
      }
      .side-stat .sl {
        font-size: 10px;
        color: var(--text-3);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-top: 2px;
      }

      /* Right side — form */
      .login-form-side {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 32px;
        background: var(--bg-1);
      }
      .login-box {
        width: 100%;
        max-width: 380px;
      }

      /* Quick login section */
      .quick-login-section {
        margin-bottom: 24px;
      }
      .ql-label {
        font-family: var(--font-cond);
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: var(--text-3);
        margin-bottom: 10px;
      }
      .ql-grid {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .ql-account {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 9px 12px;
        background: var(--bg-3);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        cursor: pointer;
        transition: all var(--trans);
      }
      .ql-account:hover {
        border-color: var(--accent);
        background: var(--accent-dim);
      }
      .ql-account.selected {
        border-color: var(--accent);
        background: var(--accent-dim);
      }
      .ql-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--bg-4);
        border: 1px solid var(--border-2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--font-head);
        font-size: 13px;
        font-weight: 700;
        color: var(--accent);
        flex-shrink: 0;
        overflow: hidden;
      }
      .ql-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .ql-info {
        flex: 1;
        min-width: 0;
      }
      .ql-ign {
        font-family: var(--font-head);
        font-size: 13px;
        font-weight: 700;
      }
      .ql-game {
        font-size: 11px;
        color: var(--text-3);
        margin-top: 1px;
      }
      .ql-remove {
        background: none;
        border: none;
        color: var(--text-3);
        cursor: pointer;
        font-size: 16px;
        line-height: 1;
        padding: 2px;
      }
      .ql-remove:hover {
        color: var(--red);
      }
      .ql-add {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        border: 1px dashed var(--border);
        border-radius: var(--radius-lg);
        cursor: pointer;
        font-size: 12px;
        color: var(--text-3);
        transition: all var(--trans);
      }
      .ql-add:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      /* Divider */
      .or-divider {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 16px 0;
        color: var(--text-3);
        font-size: 12px;
      }
      .or-divider::before,
      .or-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }

      /* Approval status in login result */
      .status-pending {
        background: rgba(251, 191, 36, 0.1);
        border: 1px solid rgba(251, 191, 36, 0.3);
        color: var(--yellow);
        padding: 10px 14px;
        border-radius: var(--radius-lg);
        font-size: 13px;
        margin-bottom: 12px;
      }
      .status-rejected {
        background: rgba(248, 113, 113, 0.1);
        border: 1px solid rgba(248, 113, 113, 0.3);
        color: var(--red);
        padding: 10px 14px;
        border-radius: var(--radius-lg);
        font-size: 13px;
        margin-bottom: 12px;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="container">
        <a href="/index.html" class="nav-logo">
          <div class="nav-logo-icon"></div>
          ESPORTS<span>HUB</span>
        </a>
      </div>
    </nav>

    <div class="login-wrap">
      <!-- Branding side -->
      <div class="login-side">
        <div style="position: relative; z-index: 1; text-align: center">
          <div class="side-logo">ESPORTS<span>HUB</span></div>
          <div class="side-sub">
            Track scores, teams, players and tournaments<br />across Valorant, BGMI
            and CS2
          </div>
          <div class="side-games">
            <div class="side-game-card">
              <div class="icon">🎯</div>
              <div class="name">Valorant</div>
            </div>
            <div class="side-game-card">
              <div class="icon">🔫</div>
              <div class="name">BGMI</div>
            </div>
            <div class="side-game-card">
              <div class="icon">💣</div>
              <div class="name">CS2</div>
            </div>
          </div>
          <div style="position: relative; z-index: 1; text-align: center">
            <div class="side-stats" id="side-stats">
              <div class="side-stat">
                <div class="sv" id="ss-teams">—</div>
                <div class="sl">Teams</div>
              </div>
              <div class="side-stat">
                <div class="sv" id="ss-players">—</div>
                <div class="sl">Players</div>
              </div>
              <div class="side-stat">
                <div class="sv" id="ss-matches">—</div>
                <div class="sl">Matches</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Form side -->
      <div class="login-form-side">
        <div class="login-box">
          <div
            style="
              font-family: var(--font-head);
              font-size: 26px;
              font-weight: 700;
              margin-bottom: 4px;
            "
          >
            Sign In
          </div>
          <div
            style="font-size: 13px; color: var(--text-2); margin-bottom: 24px"
          >
            Welcome back.
            <a href="/register.html" style="color: var(--accent)"
              >Create an account</a
            >
          </div>

          <!-- Quick login accounts -->
          <div
            class="quick-login-section"
            id="ql-section"
            style="display: none"
          >
            <div class="ql-label">Quick Login</div>
            <div class="ql-grid" id="ql-grid"></div>
            <div class="or-divider">or sign in with credentials</div>
          </div>

          <!-- Status messages -->
          <div
            id="status-pending"
            class="status-pending"
            style="display: none"
          ></div>
          <div
            id="status-rejected"
            class="status-rejected"
            style="display: none"
          ></div>
          <div class="form-error" id="login-error"></div>

          <!-- Credentials form -->
          <div class="form-group">
            <label class="form-label">Username</label>
            <input
              class="form-input"
              type="text"
              id="username"
              placeholder="your_username"
              autocomplete="username"
              onkeydown="if(event.key==='Enter')doLogin()"
            />
          </div>
          <div class="form-group">
            <label class="form-label">Password</label>
            <input
              class="form-input"
              type="password"
              id="password"
              placeholder="••••••••"
              autocomplete="current-password"
              onkeydown="if(event.key==='Enter')doLogin()"
            />
          </div>

          <button
            class="btn btn-primary"
            style="width: 100%; padding: 12px; font-size: 15px; margin-top: 8px"
            id="login-btn"
            onclick="doLogin()"
          >
            Sign In
          </button>

          <div
            style="
              text-align: center;
              margin-top: 16px;
              font-size: 13px;
              color: var(--text-2);
            "
          >
            Don't have an account?
            <a href="/register.html" style="color: var(--accent)">Register</a>
          </div>
        </div>
      </div>
    </div>

    <script src="/js/api.js"></script>
    <script>
      if (API.isLoggedIn()) location.href = "/index.html";

      // ── Saved quick-login accounts ────────────────────
      // Stored as array of {username, display_name, avatar, game_accounts}
      const QL_KEY = "esportshub_quick_logins";

      function getSavedAccounts() {
        try {
          return JSON.parse(localStorage.getItem(QL_KEY) || "[]");
        } catch (e) {
          return [];
        }
      }
      function saveAccount(acct) {
        const list = getSavedAccounts().filter(
          (a) => a.username !== acct.username
        );
        list.unshift(acct); // most recent first
        localStorage.setItem(QL_KEY, JSON.stringify(list.slice(0, 5))); // max 5
      }
      function removeAccount(username) {
        const list = getSavedAccounts().filter((a) => a.username !== username);
        localStorage.setItem(QL_KEY, JSON.stringify(list));
        renderQuickLogins();
      }

      function renderQuickLogins() {
        const accounts = getSavedAccounts();
        const section = document.getElementById("ql-section");
        const grid = document.getElementById("ql-grid");
        if (!accounts.length) {
          section.style.display = "none";
          return;
        }
        section.style.display = "";

        grid.innerHTML =
          accounts
            .map(
              (a) => `
    <div class="ql-account" onclick="quickLogin('${a.username}')">
      <div class="ql-avatar">
        ${
          a.avatar
            ? `<img src="${a.avatar}" onerror="this.style.display='none'" alt="">`
            : (a.username || "?")[0].toUpperCase()
        }
      </div>
      <div class="ql-info">
        <div class="ql-ign">${a.username}</div>
        <div class="ql-game">${a.games ? a.games.join(", ") : "Player"}${
                a.approval_status === "pending"
                  ? " · ⏳ Pending"
                  : a.approval_status === "approved"
                  ? " · ✅ Active"
                  : ""
              }</div>
      </div>
      <button class="ql-remove" onclick="event.stopPropagation();removeAccount('${
        a.username
      }')" title="Remove from quick login">×</button>
    </div>`
            )
            .join("") +
          `
    <div class="ql-add" onclick="focusCredentials()">
      <span style="font-size:16px">+</span> Sign in with different account
    </div>`;
      }

      function quickLogin(username) {
        document.getElementById("username").value = username;
        document.getElementById("password").focus();
        // Highlight selected
        document.querySelectorAll(".ql-account").forEach((el) => {
          el.classList.toggle(
            "selected",
            el.querySelector(".ql-ign")?.textContent === username
          );
        });
      }

      function focusCredentials() {
        document.getElementById("username").value = "";
        document.getElementById("username").focus();
        document
          .querySelectorAll(".ql-account")
          .forEach((el) => el.classList.remove("selected"));
      }

      // ── Login ─────────────────────────────────────────
      async function doLogin() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        const errEl = document.getElementById("login-error");
        const btn = document.getElementById("login-btn");
        const pendEl = document.getElementById("status-pending");
        const rejEl = document.getElementById("status-rejected");

        errEl.style.display = "none";
        pendEl.style.display = "none";
        rejEl.style.display = "none";

        if (!username || !password) {
          errEl.textContent = "Please enter username and password";
          errEl.style.display = "block";
          return;
        }

        btn.textContent = "Signing in…";
        btn.disabled = true;

        try {
          const data = await API.post("/auth/login", { username, password });

          // Store for quick login
          saveAccount({
            username: data.username,
            avatar: null, // will be filled on profile load
            games: ["Player"],
            approval_status: data.approval_status || "approved",
          });

          API.login(data.token, {
            username: data.username,
            role: data.role,
            player_id: data.player_id,
            approval_status: data.approval_status,
          });

          // Show approval status before redirect
          if (data.approval_status === "pending") {
            pendEl.innerHTML = `⏳ Your account is <strong>pending approval</strong> for your selected games. You can browse the site but full access is limited until an admin approves you.`;
            pendEl.style.display = "block";
            btn.textContent = "Redirecting…";
            setTimeout(() => (location.href = "/index.html"), 2500);
          } else if (data.approval_status === "rejected") {
            rejEl.innerHTML = `⛔ Your registration was <strong>not approved</strong>. Please contact support via <a href="/contentions.html" style="color:inherit;font-weight:700">Contentions</a>.`;
            rejEl.style.display = "block";
            btn.textContent = "Sign In";
            btn.disabled = false;
          } else {
            location.href = "/index.html";
          }
        } catch (e) {
          errEl.textContent = e.error || "Invalid username or password";
          errEl.style.display = "block";
          btn.textContent = "Sign In";
          btn.disabled = false;
        }
      }

      // ── Side stats ────────────────────────────────────
      async function loadSideStats() {
        try {
          const [teams, players] = await Promise.all([
            API.get("/teams"),
            API.get("/players?limit=1000"),
          ]);
          document.getElementById("ss-teams").textContent = teams.length;
          document.getElementById("ss-players").textContent = players.length;
          // Fetch match count from search
          const matchData = await API.get(
            "/stats/search?type=match&limit=1000"
          );
          document.getElementById("ss-matches").textContent =
            matchData.matches?.length || "—";
        } catch (e) {}
      }

      // ── Init ──────────────────────────────────────────
      renderQuickLogins();
      loadSideStats();
    </script>
  </body>
</html>
