    <div id="footer-mount"></div>
    <script src="/js/api.js"></script>
    <script>
      let allTournaments = [];

      function eventCard(ev, featured = false) {
        const statusBadge =
          ev.status === "Live"
            ? `<span class="badge badge-live">Live</span>`
            : ev.status === "Upcoming"
            ? `<span class="badge badge-upcoming">Upcoming</span>`
            : `<span class="badge badge-done">Completed</span>`;

        return `
  <div class="event-card" onclick="location.href='/event-detail.html?id=${
    ev.tournament_id
  }'">
    <div class="event-card-banner" style="${featured ? "height:130px" : ""}">
      <div class="event-card-banner-text">${
        ev.name.split(":")[0] || "VCT"
      }</div>
    </div>
    <div class="event-card-body">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px">
        <div class="event-card-name">${ev.name}</div>
        ${statusBadge}
      </div>
      <div class="event-card-meta">
        <span>📅 ${Components.formatDate(ev.start_date)}${
          ev.end_date ? " – " + Components.formatDate(ev.end_date) : ""
        }</span>
        ${ev.location ? `<span>📍 ${ev.location}</span>` : ""}
        ${ev.type ? `<span>🏆 ${ev.type}</span>` : ""}
        ${
          ev.registered_teams
            ? `<span>👥 ${ev.registered_teams} teams</span>`
            : ""
        }
      </div>
      ${
        ev.prize_pool
          ? `<div class="event-card-prize">${Components.formatPrize(
              ev.prize_pool
            )}</div>`
          : ""
      }
    </div>
  </div>`;
      }

      async function loadTournaments(status = "") {
        const gridEl = document.getElementById("events-grid");
        gridEl.innerHTML = Components.loading();

        try {
          const url = status ? `/tournaments?status=${status}` : "/tournaments";
          allTournaments = await API.get(url);

          // Update the Title Dynamically
          document.getElementById("all-events-title").textContent = status 
            ? `${status} Tournaments` 
            : "All Tournaments";

          // Update the count
          document.getElementById("events-count").textContent = `${allTournaments.length} tournaments`;

          // All tournaments grid
          gridEl.innerHTML = allTournaments.length
            ? allTournaments.map((e) => eventCard(e)).join("")
            : Components.empty("No tournaments found");
            
        } catch (e) {
          console.error(e); 
          gridEl.innerHTML = Components.empty("Failed to load tournaments");
        }
      }

      function switchTab(btn, status) {
        document
          .querySelectorAll(".filter-tab")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        loadTournaments(status);
      }
